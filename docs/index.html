<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Surprise Widget</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #F8F5FF;
      color: #2D1E5F;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .logo { font-size: 80px; margin-bottom: 16px; }
    h1 { font-size: 36px; font-weight: 900; }
    h1 span { color: #9D6BFF; }
    p { color: #8A7A9A; margin-top: 8px; font-size: 16px; text-align: center; }
    .links { margin-top: 40px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
    .btn {
      background: #9D6BFF;
      color: white;
      font-weight: 800;
      font-size: 16px;
      padding: 14px 28px;
      border-radius: 50px;
      text-decoration: none;
      border: 3px solid #2D1E5F;
      box-shadow: 4px 4px 0 #2D1E5F;
    }
    .btn.outline {
      background: white;
      color: #2D1E5F;
    }
  </style>
</head>
<body>
  <div class="logo">🎁</div>
  <h1>Surprise <span>Widget</span></h1>
  <p>Sevdiklerinize sürpriz kartlar gönderin,<br>widget'larında anlık görünsün.</p>
  <div class="links">
    <a class="btn" href="privacy.html">Gizlilik Politikası</a>
    <a class="btn outline" href="terms.html">Kullanım Koşulları</a>
  </div>
</body>
</html>
